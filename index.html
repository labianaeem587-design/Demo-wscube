<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily tasks</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
       <h2>Daily planner</h2>
       <div class="input-group">
        <input type="text" id="taskInput"  placeholder="Enter text">
        <input type="time" id="timeInput" placeholder="Select time">
        <button onclick="addTask()">Add</button>
       </div>
       <ul id="taskList"></ul>
    </div>

    <script  src="script.js"></script>
</body>
</html>
